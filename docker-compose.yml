
version: '3.8'

services:
  spark-gpu:
    image: spark-gpu:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "4040:4040" # Spark UI
      - "8080:8080" # Spark Master UI
      - "7077:7077" # Spark Master Port
      - "8081:8081" # Spark Worker UI
    volumes:
      - ./data:/opt/spark/data
      - ./models:/opt/spark/models
      - ./reports:/opt/spark/reports
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge
