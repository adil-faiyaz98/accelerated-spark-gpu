# GPU-Accelerated Spark Configuration
# This configuration file provides centralized settings for the GPU acceleration pipeline

# Application Information
application {
    name = "GPU-Accelerated Spark Pipeline"
    version = "1.0.0"
    description = "GPU acceleration demonstration for Apache Spark"
}

# Spark Configuration
spark {
    # Master URL - can be overridden by environment variable SPARK_MASTER
    master = "local[*]"
    
    # Application settings
    app {
        name = ${application.name}
        serializer = "org.apache.spark.serializer.KryoSerializer"
    }
    
    # SQL and DataFrame optimizations
    sql {
        adaptive {
            enabled = true
            coalescePartitions.enabled = true
            skewJoin.enabled = true
            shuffle.targetPostShuffleInputSize = "64MB"
        }
        execution {
            arrow.pyspark.enabled = true
        }
        shuffle {
            partitions = 200
        }
    }
    
    # Memory configuration
    memory {
        executor {
            fraction = 0.8
            memory = "4g"
        }
        driver {
            memory = "2g"
        }
    }
    
    # GPU-specific configuration (RAPIDS)
    gpu {
        enabled = true
        rapids {
            sql {
                enabled = true
                explain = "NOT_ON_GPU"
                incompatibleOps.enabled = true
                concurrentGpuTasks = 2
            }
            memory {
                gpu {
                    pooling.enabled = true
                    allocFraction = 0.8
                }
            }
        }
    }
}

# Data Generation Configuration
data {
    generation {
        # Default record counts for synthetic datasets
        taxi {
            recordCount = 1000000
            outputPath = "data/taxi_trips"
        }
        housing {
            recordCount = 500000
            outputPath = "data/housing_market"
        }
        
        # Data quality settings
        validation {
            enabled = true
            nullTolerancePercent = 0.0
        }
        
        # Output settings
        output {
            compression = "snappy"
            format = "parquet"
            coalescePartitions = 1
        }
    }
}

# Machine Learning Configuration
ml {
    # Model training settings
    models {
        randomForest {
            numTrees = 100
            maxDepth = 10
            seed = 42
        }
        linearRegression {
            maxIter = 100
            regParam = 0.01
            elasticNetParam = 0.0
        }
        xgboost {
            numRound = 100
            maxDepth = 6
            eta = 0.1
            subsample = 0.8
            colsampleBytree = 0.8
            treeMethod = "gpu_hist" # GPU acceleration for XGBoost
        }
    }
    
    # Feature engineering
    features {
        scaling {
            withStd = true
            withMean = true
        }
        
        # Feature columns for housing price prediction
        housing {
            features = ["total_rooms", "bedrooms", "bathrooms", "square_feet", "age_years", "distance_to_center_km", "crime_rate", "school_rating"]
            target = "price"
        }
    }
    
    # Model evaluation
    evaluation {
        testSplitRatio = 0.2
        seed = 42
        metrics = ["rmse", "mae", "r2"]
    }
    
    # Model persistence
    persistence {
        outputPath = "models"
        overwrite = true
    }
}

# Benchmarking Configuration
benchmarking {
    # Performance testing settings
    iterations = 3
    warmupIterations = 1
    
    # Operations to benchmark
    operations {
        etl = true
        aggregations = true
        joins = true
        mlTraining = true
    }
    
    # Dataset sizes for benchmarking
    dataSizes {
        small = 100000
        medium = 1000000
        large = 5000000
    }
    
    # Timeout settings (in seconds)
    timeouts {
        operation = 300
        total = 1800
    }
}

# Reporting Configuration
reporting {
    # Output settings
    output {
        directory = "reports"
        formats = ["html", "json", "csv"]
    }
    
    # Report types
    types {
        performance = true
        modelEvaluation = true
        dataQuality = true
        systemMetrics = true
    }
    
    # Visualization settings
    charts {
        enabled = true
        width = 800
        height = 600
        format = "png"
    }
}

# Logging Configuration
logging {
    level = "INFO"
    
    # Log file settings
    file {
        enabled = true
        path = "logs/spark-gpu-pipeline.log"
        maxSize = "100MB"
        maxFiles = 10
    }
    
    # Console logging
    console {
        enabled = true
        pattern = "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
    }
}

# System Resource Monitoring
monitoring {
    enabled = true
    
    # Metrics collection
    metrics {
        cpu = true
        memory = true
        gpu = true
        disk = true
        network = false
    }
    
    # Collection intervals (in seconds)
    intervals {
        system = 5
        spark = 10
        gpu = 2
    }
}
